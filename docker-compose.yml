services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DHURANDHAR_ENV: ${DHURANDHAR_ENV:-development}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DHURANDHAR_EVENT_LOG: /app/data/events.jsonl
      DHURANDHAR_SEED_DEMO: ${DHURANDHAR_SEED_DEMO:-true}
      DHURANDHAR_CORS_ORIGINS: ${DHURANDHAR_CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
      DHURANDHAR_RUNTIME: ${DHURANDHAR_RUNTIME:-deterministic}
      DHURANDHAR_ENABLE_CODEX_RUNTIME: ${DHURANDHAR_ENABLE_CODEX_RUNTIME:-false}
      DHURANDHAR_CODEX_APPLY_CHANGES: ${DHURANDHAR_CODEX_APPLY_CHANGES:-false}
      DHURANDHAR_CODEX_BIN: ${DHURANDHAR_CODEX_BIN:-codex}
      DHURANDHAR_CODEX_WORKDIR: /app
      DHURANDHAR_CODEX_TIMEOUT_SECONDS: ${DHURANDHAR_CODEX_TIMEOUT_SECONDS:-120}
      DHURANDHAR_IMPLEMENTATION_MODEL: ${DHURANDHAR_IMPLEMENTATION_MODEL:-gpt-5.5}
      DHURANDHAR_REVIEWER_MODEL: ${DHURANDHAR_REVIEWER_MODEL:-gpt-5.5}
      DHURANDHAR_OPERATOR_TOKEN: ${DHURANDHAR_OPERATOR_TOKEN:-}
    volumes:
      - dhurandhar-data:/app/data
      - dhurandhar-workspaces:/app/workspaces
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    init: true
    restart: unless-stopped

volumes:
  dhurandhar-data:
  dhurandhar-workspaces:
