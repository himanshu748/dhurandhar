services:
  - type: web
    name: dhurandhar-asc
    runtime: docker
    plan: free
    repo: https://github.com/himanshu748/dhurandhar
    branch: agent/finalize-dhurandhar
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: "off"
    envVars:
      - key: DHURANDHAR_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: INFO
      - key: DHURANDHAR_EVENT_LOG
        value: /tmp/events.jsonl
      - key: DHURANDHAR_SEED_DEMO
        value: "true"
      - key: DHURANDHAR_RUNTIME
        value: deterministic
      - key: DHURANDHAR_ENABLE_CODEX_RUNTIME
        value: "false"
      - key: DHURANDHAR_CODEX_APPLY_CHANGES
        value: "false"
