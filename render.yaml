services:
  - type: web
    name: dhurandhar-asc
    runtime: docker
    plan: free
    repo: https://github.com/himanshu748/dhurandhar
    branch: agent/finalize-dhurandhar
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Render's Docker runtime builds through Dockerfile; dockerCommand is the
    # schema-valid equivalent of a native-runtime startCommand.
    dockerCommand: >-
      sh -c 'exec uvicorn app.main:app --app-dir backend --host ${APP_HOST:-0.0.0.0} --port ${PORT:-${APP_PORT:-8000}}'
    healthCheckPath: /api/health
    autoDeployTrigger: "off"
    envVars:
      - key: DHURANDHAR_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: INFO
      - key: DHURANDHAR_EVENT_LOG
        value: /tmp/events.jsonl
      - key: DHURANDHAR_SEED_DEMO
        value: "true"
      - key: DHURANDHAR_RUNTIME
        value: deterministic
      - key: DHURANDHAR_ENABLE_CODEX_RUNTIME
        value: "false"
      - key: DHURANDHAR_CODEX_APPLY_CHANGES
        value: "false"
